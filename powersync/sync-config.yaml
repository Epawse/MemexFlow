config:
  edition: 3

streams:
  user_profiles:
    auto_subscribe: true
    query: SELECT id, email, display_name, avatar_url, preferences, created_at, updated_at FROM users WHERE id = auth.user_id()

  projects:
    auto_subscribe: true
    query: SELECT id, user_id, title, description, color, icon, archived, created_at, updated_at FROM projects WHERE user_id = auth.user_id()

  captures:
    auto_subscribe: true
    query: SELECT id, user_id, project_id, type, title, content, url, metadata, status, confirmed_at, created_at, updated_at FROM captures WHERE user_id = auth.user_id()

  memories:
    auto_subscribe: true
    query: SELECT id, user_id, project_id, capture_id, content, summary, metadata, created_at, updated_at FROM memories WHERE user_id = auth.user_id()

  briefs:
    auto_subscribe: true
    query: SELECT id, user_id, project_id, title, content, type, status, metadata, created_at, updated_at FROM briefs WHERE user_id = auth.user_id()

  signals:
    auto_subscribe: true
    query: SELECT id, user_id, project_id, type, title, description, confidence, related_memory_ids, metadata, created_at, updated_at FROM signals WHERE user_id = auth.user_id()

  signal_rules:
    auto_subscribe: true
    query: SELECT id, user_id, project_id, name, query, match_type, channel_type, channel_config, is_active, last_checked_at, created_at, updated_at FROM signal_rules WHERE user_id = auth.user_id()

  signal_matches:
    auto_subscribe: true
    query: SELECT id, user_id, signal_rule_id, memory_id, matched_text, is_dismissed, matched_at FROM signal_matches WHERE user_id = auth.user_id()

  signal_discoveries:
    auto_subscribe: true
    query: SELECT id, user_id, signal_rule_id, project_id, source_type, source_uri, title, summary, published_at, is_captured, capture_id, discovered_at FROM signal_discoveries WHERE user_id = auth.user_id()

  memory_associations:
    auto_subscribe: true
    query: SELECT id, user_id, from_memory_id, to_memory_id, relation_type, note, created_at FROM memory_associations WHERE user_id = auth.user_id()

  brief_memories:
    auto_subscribe: true
    query: SELECT brief_id, memory_id, relevance FROM brief_memories

  jobs:
    auto_subscribe: true
    query: SELECT id, user_id, type, status, input, output, error, created_at, updated_at, started_at, completed_at FROM jobs WHERE user_id = auth.user_id()